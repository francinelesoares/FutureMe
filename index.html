<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FutureMe</title>

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="container">

        <div class="topo">

            <h1>FutureMe</h1>

            <button id="toggle-theme">
                🌙
            </button>

        </div>

        <p class="subtitulo">
            Converse com sua versão do futuro.
        </p>

        <h2 id="auth-title">Entrar</h2>
        
        <button id="btn-auth" onclick="login()">
            Entrar
        </button>

        <div class="auth-links">
        
            <p class="auth-text">
                Não tem conta?
                <span onclick="mostrarCadastro()">
                    Cadastre-se
                </span>
            </p>
        
            <p class="reset-password" onclick="resetarSenha()">
                Esqueceu a senha?
            </p>
        
        </div>

        <input type="email" id="email" placeholder="Seu email">

        <input type="password" id="senha" placeholder="Sua senha">

        <button onclick="cadastrar()">
            Cadastrar
        </button>

        <button onclick="login()">
            Login
        </button>

        <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>

        <input id="data" type="date">

        <button onclick="salvarCarta()">
            Salvar carta
        </button>

        <div id="lista-cartas"></div>

    </div>

    <!-- FIREBASE -->

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
